---
name: Auto Delete Merged Branch

# 在 PR 關閉時觸發
on:
  pull_request:
    types:
      - closed

jobs:
  delete-branch:
    # 僅在 PR 被合併（非單純關閉）時執行
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    
    steps:
      - name: Delete merged branch and comment
        uses: actions/github-script@v9
        with:
          script: |
            const branchName = context.payload.pull_request.head.ref;
            const prNumber = context.payload.pull_request.number;
            
            console.log(`PR #${prNumber} 已被合併`);
            console.log(`來源分支: ${branchName}`);
            console.log(`目標分支: ${context.payload.pull_request.base.ref}`);
            
            try {
              // 刪除遠端分支
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `heads/${branchName}`
              });
              
              console.log(`✅ 成功刪除分支: ${branchName}`);
              
              // 在 PR 留言
              await github.rest.issues.createComment({
                issue_number: prNumber,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `🎉 分支 \`${branchName}\` 已自動刪除`
              });
            } catch (error) {
              console.log(`⚠️ 刪除分支失敗或分支已不存在: ${error.message}`);
              
              // 即使刪除失敗也留言
              await github.rest.issues.createComment({
                issue_number: prNumber,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `ℹ️ 分支 \`${branchName}\` 已被處理（可能已被手動刪除）`
              });
            }
